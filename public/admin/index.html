<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>OORMAX Playout | Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ambient-glow glow-red"></div>
  <div class="ambient-glow glow-purple"></div>

  <div id="authScreen" class="glass-panel modal active">
    <div class="brand">OORMAX <span>PLAYOUT</span></div>
    <form id="loginForm">
      <input type="email" id="email" placeholder="Email Address" required>
      <input type="password" id="password" placeholder="Password" required>
      <button type="submit" class="btn primary pill">Authenticate</button>
    </form>
    <div id="authErr" class="err hidden"></div>
  </div>

  <div id="dashboard" class="hidden">
    
    <header class="glass-panel nav-island">
      <div class="brand-sm">OORMAX</div>
      <div class="channel-selector">
        <select id="channelSelect"></select>
      </div>
      <div class="nav-actions">
        <button id="logoutBtn" class="btn ghost pill">Logout</button>
      </div>
    </header>

    <div class="grid-layout">
      
      <section class="glass-panel col-monitor">
        <div class="panel-header">
          <h2>Live Telemetry</h2>
          <div id="broadcastStatus" class="status-badge live">
            <span class="dot"></span> <span class="text">LIVE</span>
          </div>
        </div>
        
        <div id="activeTracker" class="tracker-container hidden">
          <div class="tracker-info">
            <span id="trackerPhase">Commercial Break</span>
            <span id="trackerTime">00:00</span>
          </div>
          <div class="progress-bar-bg">
            <div id="trackerProgress" class="progress-bar-fill"></div>
          </div>
          <ul id="activePodList" class="active-pod-list">
            </ul>
          <button id="resumeLiveBtn" class="btn danger pill full-width mt-4">Force Resume Live</button>
        </div>

        <div id="idleState" class="idle-state">
          Broadcast is clean.<br>Ready for ad injection.
        </div>
      </section>

      <section class="glass-panel col-sequencer">
        <div class="panel-header">
          <h2>Next Pod Stager</h2>
          <span class="muted-text">Stitch multiple ads</span>
        </div>
        
        <div class="stager-area">
          <ul id="stagedPodList" class="staged-list">
            <li class="empty-stager" id="emptyStagerMsg">Drag or click + to add ads here</li>
          </ul>
        </div>

        <div class="stager-controls">
          <div class="pod-summary">
            <span>Total Duration:</span>
            <span id="stagedTotalTime">0s</span>
          </div>
          <button id="triggerPodBtn" class="btn primary pill full-width massive" disabled>Trigger Commercial Break</button>
        </div>
      </section>

      <section class="glass-panel col-library">
        <div class="panel-header">
          <h2>Ad Library</h2>
          <button id="openUploadBtn" class="btn outline pill small">+ New Ad</button>
        </div>
        <div class="library-filters">
          <input type="text" id="searchAds" class="pill search" placeholder="Search library...">
        </div>
        
        <ul id="adLibraryList" class="library-list">
          </ul>
      </section>

    </div>
  </div>

  <div id="uploadModal" class="modal-overlay hidden">
    <div class="glass-panel modal upload-modal">
      <h2>Upload New Ad</h2>
      <form id="uploadForm">
        <input type="file" id="uploadFile" accept="video/mp4,video/webm,image/png,image/jpeg,image/webp,image/gif" required>
        <input type="text" id="uploadName" placeholder="Ad Title" required>
        <input type="number" id="uploadDuration" placeholder="Duration (Seconds)" value="15" min="1" max="600" required>
        <input type="url" id="uploadClickUrl" placeholder="Click URL (Optional)">
        
        <div class="modal-actions">
          <button type="button" id="closeUploadBtn" class="btn ghost pill">Cancel</button>
          <button type="submit" id="submitUploadBtn" class="btn primary pill">Upload to CDN</button>
        </div>
        <div id="uploadErr" class="err hidden mt-2"></div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
