<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>OORMAX Playout | Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Ambient Background Glows -->
  <div class="ambient-glow glow-red"></div>
  <div class="ambient-glow glow-purple"></div>

  <!-- The SPA Mount Point -->
  <div id="app"></div>

  <!-- Auth Screen Template -->
  <template id="tpl-auth">
    <div class="wrap narrow glass-panel" style="margin-top: 10vh;">
      <div class="brand" style="text-align: center; margin-bottom: 30px; font-size: 24px; font-weight: 800; letter-spacing: 2px;">
        OORMAX <span style="color: #ff2a2a;">PLAYOUT</span>
      </div>
      <div class="tabs">
        <button data-tab="login" class="active">Login</button>
        <button data-tab="register">Register</button>
      </div>

      <section data-view="login">
        <label>Email</label><input type="email" name="email" autocomplete="email" />
        <label>Password</label><input type="password" name="password" autocomplete="current-password" />
        <button class="primary" data-act="login" style="width: 100%; margin-top: 16px; padding: 14px;">Log in</button>
        <div class="err" data-err></div>
      </section>

      <section class="hidden" data-view="register">
        <label>Organization name</label><input name="name" />
        <label>Email</label><input type="email" name="email" />
        <label>Password (8+ chars)</label><input type="password" name="password" minlength="8" />
        <button class="primary" data-act="register" style="width: 100%; margin-top: 16px; padding: 14px;">Create account</button>
        <div class="err" data-err></div>
      </section>
    </div>
  </template>

  <!-- Dashboard Shell Template -->
  <template id="tpl-dash">
    <header class="top glass-panel nav-island">
      <div class="brand">OORMAX <span style="color: #ff2a2a;">PLAYOUT</span></div>
      <nav>
        <a data-nav="overview" class="active">Overview</a>
        <a data-nav="channels">Channels</a>
        <a data-nav="ads">Ad Library</a>
        <a data-nav="events">Events</a>
        <a data-nav="keys">API Keys</a>
        <a data-nav="settings">Settings</a>
        <a href="/admin/streaming-security.html">Stream Security</a>
        <a data-nav="platform" data-admin class="hidden admin-tab">Platform</a>
        <a data-nav="audit"    data-admin class="hidden admin-tab">Audit</a>
      </nav>
      <div class="who"><span data-who></span> <button data-act="logout" class="danger small" style="margin-left: 12px;">Log out</button></div>
    </header>
    <main id="view"></main>
  </template>

  <script src="app.js"></script>
</body>
</html>
