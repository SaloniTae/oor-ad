<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Live Player</title>
<link rel="stylesheet" href="style.css" />
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.17/dist/hls.min.js"></script>
</head>
<body>
  <header>
    <div class="brand">● LIVE</div>
    <div id="status" class="status">connecting…</div>
  </header>

  <main>
    <video id="video" playsinline controls autoplay muted></video>
    <div id="badge" class="badge hidden">AD • <span id="countdown">0</span>s</div>
  </main>

  <footer>
    <div class="meta">
      <div>Mode: <b id="mode">live</b></div>
      <div>Client: <span id="cid">-</span></div>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
