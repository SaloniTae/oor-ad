<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Live Player</title>
<link rel="stylesheet" href="style.css" />
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.17/dist/hls.min.js"></script>
</head>
<body>
  <header>
    <div class="brand">LIVE</div>
    <div id="status" class="status">connecting…</div>
  </header>

  <main>
    <div class="stage">
      <!--
        Fixed roles: videoA is ALWAYS the live stream (loaded once, never touched
        again during ads). videoB is ONLY used for video ads. During any ad,
        videoA keeps playing behind – muted – so the return-to-live is instant
        with no reload and no restart-from-beginning.
      -->
      <video id="videoA" class="v v-live" playsinline autoplay muted preload="auto"></video>
      <video id="videoB" class="v v-ad"   playsinline           muted preload="auto"></video>
      <a id="imgLink" class="img-layer hidden" target="_blank" rel="noopener">
        <img id="imgAd" alt="advertisement" />
      </a>
      <div id="badge" class="badge hidden">AD <span id="countdown">0</span>s</div>
      <div id="loading" class="loading hidden">Loading ad…</div>
    </div>
    <div class="controls">
      <button id="unmute">🔊 Unmute</button>
    </div>
  </main>

  <footer>
    <div class="meta">
      <div>Mode: <b id="mode">live</b></div>
      <div>Viewer: <span id="cid">-</span></div>
      <div>Channel: <span id="ch">-</span></div>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
