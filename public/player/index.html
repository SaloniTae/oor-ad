<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Live Player</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.17/dist/hls.min.js"></script>
</head>
<body>
  <div class="stage">
    <!-- Raw video taking the entire screen -->
    <video id="videoA" class="v v-live" playsinline autoplay preload="auto"></video>
    <video id="videoB" class="v v-ad"   playsinline autoplay preload="auto"></video>

    <a id="imgLink" class="img-layer" target="_blank" rel="noopener">
      <img id="imgAd" alt="advertisement" />
    </a>

    <!-- Premium UI overlays occupying the same location -->
    <div id="loading" class="badge">We'll be right back</div>
    <div id="badge" class="badge">Ad will end in <span id="countdown">0</span>s</div>
    
    <button id="unmute" class="unmute-btn">Tap to Unmute</button>
  </div>

  <!-- Hidden elements to maintain app.js state references -->
  <div style="display:none;">
    <span id="status"></span><span id="mode"></span><span id="cid"></span><span id="ch"></span>
  </div>

  <script src="app.js"></script>



  <script src="/player/stream-security-client.js"></script>
<script>
  const s = new StreamSecurity({ pin: '482910', channelSlug: 'my-channel-slug' });
  
  const auth = await s.authorize();
  
  if (auth.needsKick) {
    // Show modal: "This PIN is already streaming on N devices. End one?"
    // List auth.activeSessions with device labels
    // User picks one:
    await s.confirmKick(auth.activeSessions[0].sessionId);
  }
  
  // Listen for kicks from other devices or admin
  s.connectLifecycleWs();
  document.addEventListener('oor:session_terminated', () => {
    hlsPlayer.destroy();  // MUST destroy, not just pause
    showOverlay('Playback stopped — this account is now streaming on another device.');
  });
  
  // Load the signed manifest
  hlsPlayer.loadSource(s.manifestUrl());
</script>


  
</body>
</html>
