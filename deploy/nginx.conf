# NOTE: To scale beyond ~1024 concurrent WS on a single Nginx, raise:
#   worker_connections 20000;   (in nginx.conf events{})
#   worker_rlimit_nofile 40000;
# and increase kernel limits (see deploy/sysctl.conf).
