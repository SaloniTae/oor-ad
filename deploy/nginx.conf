# /etc/nginx/sites-available/ad-injection
# Reverse proxy so viewers can hit https://your-domain/ instead of raw ports.
# Also handles TLS termination for WSS (browsers need wss:// on https pages).

# --- Upstreams -------------------------------------------------------------
upstream ad_ws     { server 127.0.0.1:6778; keepalive 64; }
upstream ad_admin  { server 127.0.0.1:6779; keepalive 32; }
upstream ad_static { server 127.0.0.1:6780; keepalive 32; }

# --- HTTP (redirect to HTTPS if you have a domain + certbot) --------------
server {
    listen 80;
    server_name _;

    # If you're using raw IP without TLS, keep this block and remove the 443 one.
    location /ws        { proxy_pass http://ad_ws;
                          proxy_http_version 1.1;
                          proxy_set_header Upgrade $http_upgrade;
                          proxy_set_header Connection "upgrade";
                          proxy_set_header Host $host;
                          proxy_set_header X-Real-IP $remote_addr;
                          proxy_read_timeout 3600s;
                          proxy_send_timeout 3600s; }
    location /api/      { rewrite ^/api/(.*)$ /$1 break;
                          proxy_pass http://ad_admin;
                          proxy_set_header Host $host; }
    location /          { proxy_pass http://ad_static;
                          proxy_set_header Host $host; }
}

